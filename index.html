<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDTactique</title>
<!-- Instance Grist utilisée : grist.numerique.gouv.fr -->
<script src="https://grist.numerique.gouv.fr/grist-plugin-api.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f6f6;
  --bg-panel:#ffffff;
  --bg-panel-raised:#fbfbfb;
  --bg-input:#ffffff;
  --line:#dedede;
  --text:#1e1e1e;
  --text-dim:#5a5a5a;
  --text-faint:#8b8b8b;
  --vert:#18753c;
  --jaune:#a68200;
  --orange:#b34000;
  --rouge:#ce0500;
  --bleu:#0063cb;
  --accent:#000091;
  --action-c:#0063cb;
  --ressource-c:#8d5b00;
  --doc-c:#7356bf;
  --font-display:'Work Sans', sans-serif;
  --font-body:'Public Sans', sans-serif;
  --font-mono:'Public Sans', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
body{min-height:100vh;}
#app{max-width:1240px;margin:0 auto;padding:20px 20px 60px;}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:0 0 6px;}
h1,h2,h3{font-family:var(--font-display);margin:0;}
h1{font-size:26px;font-weight:700;letter-spacing:-.01em;}
h2{font-size:16px;font-weight:600;}
h3{font-size:13px;font-weight:600;}
p{line-height:1.5;color:var(--text-dim);}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
a{color:var(--accent);}

/* ---------- landing ---------- */
.landing{display:flex;align-items:center;justify-content:center;min-height:90vh;padding:20px 0;}
.landing-card{width:100%;max-width:520px;background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:32px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.landing-card .sub{font-size:13px;color:var(--text-faint);margin-bottom:22px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-family:var(--font-mono);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.field input, .field select{width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg-input);color:var(--text);font-size:15px;}
.field input:focus, .field select:focus{outline:none;border-color:var(--accent);}
.role-toggle{display:flex;gap:8px;margin-bottom:16px;}
.role-toggle button{flex:1;padding:12px;border-radius:8px;border:1px solid var(--line);background:var(--bg-input);color:var(--text-dim);font-size:14px;font-weight:600;transition:.15s;}
.role-toggle button.active{border-color:var(--accent);color:var(--accent);background:rgba(0,0,145,0.06);}
.btn-primary{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent);color:#ffffff;font-weight:600;font-size:15px;}
.btn-primary:hover{filter:brightness(1.15);}
.hint{font-size:12px;color:var(--text-faint);margin-top:10px;line-height:1.5;}

.scenario-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.scenario-opt{border:1px solid var(--line);border-radius:9px;padding:11px 13px;cursor:pointer;background:var(--bg-input);transition:.12s;}
.scenario-opt:hover{border-color:var(--accent);}
.scenario-opt.active{border-color:var(--accent);background:rgba(0,0,145,.05);}
.scenario-opt.disabled{opacity:.45;cursor:not-allowed;}
.scenario-opt .so-title{font-family:var(--font-display);font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;}
.scenario-opt .so-desc{font-size:12px;color:var(--text-faint);margin-top:3px;}
.tag-soon{font-family:var(--font-mono);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;background:rgba(166,130,0,.14);color:var(--jaune);padding:2px 7px;border-radius:20px;}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 18px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.badge{font-family:var(--font-mono);font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;border:1px solid var(--line);color:var(--text-dim);background:#fff;}
.badge.mj{border-color:var(--accent);color:var(--accent);}
.badge.scenario{border-color:var(--ressource-c);color:var(--ressource-c);}
.timer{font-family:var(--font-mono);font-size:26px;font-weight:700;letter-spacing:0;font-variant-numeric:tabular-nums;}
.timer.warn{color:var(--jaune);}
.timer.crit{color:var(--rouge);}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.iconbtn{background:#fff;border:1px solid var(--line);color:var(--text-dim);padding:8px 12px;border-radius:8px;font-size:12px;font-family:var(--font-mono);font-weight:600;}
.iconbtn:hover{color:var(--accent);border-color:var(--accent);}

/* ---------- gauge ---------- */
.gauge-wrap{display:flex;align-items:center;gap:10px;}
.gauge-track{display:flex;gap:3px;}
.gauge-seg{width:20px;height:12px;border-radius:3px;background:var(--line);}
.gauge-seg.on-vert{background:var(--vert);}
.gauge-seg.on-jaune{background:var(--jaune);}
.gauge-seg.on-orange{background:var(--orange);}
.gauge-seg.on-rouge{background:var(--rouge);}
.gauge-label{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--text-dim);}

/* ---------- thermomètre de crise ---------- */
.thermo-panel{display:flex;flex-direction:column;align-items:center;padding:20px 12px 16px;}
.thermo-svg{display:block;width:100%;max-width:220px;height:auto;}
.thermo-current-label{font-family:var(--font-display);font-weight:700;font-size:14px;margin-top:8px;text-align:center;}
.thermo-current-label.crise{color:var(--rouge);animation:thermo-pulse 1.4s ease-in-out infinite;}
@keyframes thermo-pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
.thermo-sub{font-size:11px;color:var(--text-faint);text-align:center;margin-top:2px;}


/* ---------- layout ---------- */
.grid{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:960px){ .grid.two-col{grid-template-columns:1.35fr 1fr;} }
.panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:18px;}
.panel + .panel{margin-top:16px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap;}

/* ---------- event card ---------- */
.event-card{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px;background:var(--bg-panel-raised);position:relative;overflow:hidden;}
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.event-card.lvl-0::before{background:var(--vert);}
.event-card.lvl-1::before{background:var(--jaune);}
.event-card.lvl-2::before{background:var(--orange);}
.event-card.lvl-3::before,.event-card.lvl-4::before{background:var(--rouge);}
.event-card.resolved{opacity:.65;}
.event-card.resolved::before{background:var(--text-faint);}
.event-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
.event-num{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--text-faint);letter-spacing:.04em;}
.event-title{font-family:var(--font-display);font-weight:600;font-size:15px;margin:2px 0 6px;}
.event-meta{font-family:var(--font-mono);font-size:10.5px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;}
.event-body{font-size:13.5px;color:var(--text-dim);white-space:pre-wrap;margin:8px 0;}
.event-defi{font-size:13.5px;color:var(--text);background:rgba(0,0,145,0.05);border:1px solid rgba(0,0,145,0.18);border-radius:7px;padding:10px 12px;margin-top:8px;}
.event-defi b{color:var(--accent);font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
.pill{display:inline-block;font-family:var(--font-mono);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;}
.pill.ok{background:rgba(24,117,60,.12);color:var(--vert);}
.pill.ko{background:rgba(206,5,0,.12);color:var(--rouge);}
.pill.wait{background:rgba(166,130,0,.14);color:var(--jaune);}
.pill.pending{background:rgba(0,0,0,.05);color:var(--text-dim);}

.gm-note{margin-top:10px;font-size:12.5px;background:rgba(166,130,0,.07);border:1px dashed var(--jaune);border-radius:7px;padding:9px 11px;color:#6b5400;}
.gm-note b{color:var(--jaune);font-family:var(--font-mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px;}
.correction-box{margin-top:10px;background:rgba(206,5,0,.04);border:1px solid rgba(206,5,0,.22);border-radius:7px;padding:10px 12px;}
.correction-box b{color:var(--rouge);font-family:var(--font-mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;}
.correction-item{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;padding:4px 0;color:var(--text);}
.correction-item input{margin-top:3px;flex:none;}
.correction-item .malus-tag{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);margin-left:auto;flex:none;white-space:nowrap;}
.threshold-note{font-size:11.5px;color:var(--text-faint);font-family:var(--font-mono);margin-top:6px;}
.no-grille{font-size:12.5px;color:var(--text-faint);font-style:italic;margin-bottom:8px;}

.doc-box{margin-top:10px;background:rgba(115,86,191,.06);border:1px solid rgba(115,86,191,.25);border-radius:7px;padding:10px 12px;}
.doc-box b{color:var(--doc-c);font-family:var(--font-mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;}
.doc-item{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12.5px;padding:5px 0;}
.doc-edit textarea{width:100%;min-height:60px;background:var(--bg-input);border:1px solid var(--line);border-radius:6px;color:var(--text);padding:8px;font-size:12.5px;margin-top:6px;}

/* ---------- controls ---------- */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn{padding:8px 13px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--text);font-size:12.5px;font-weight:600;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.ok{border-color:var(--vert);color:var(--vert);}
.btn.ok:hover{background:rgba(24,117,60,.08);}
.btn.ko{border-color:var(--rouge);color:var(--rouge);}
.btn.ko:hover{background:rgba(206,5,0,.08);}
.btn.wait{border-color:var(--jaune);color:var(--jaune);}
.btn.wait:hover{background:rgba(166,130,0,.1);}
.btn.accent{border-color:var(--accent);color:var(--accent);}
.btn.accent:hover{background:rgba(0,0,145,.06);}
.btn.doc{border-color:var(--doc-c);color:var(--doc-c);}
.btn.doc:hover{background:rgba(115,86,191,.08);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.big{padding:12px 20px;font-size:14px;}

/* ---------- submissions / log ---------- */
.sub-item{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafafa;}
.sub-head{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--text-faint);margin-bottom:5px;flex-wrap:wrap;gap:6px;}
.sub-text{font-size:13.5px;color:var(--text);white-space:pre-wrap;}
.sub-cards{margin-top:6px;}
.log{max-height:320px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:8px;padding-right:4px;}
.log-item{font-size:12.5px;border-left:2px solid var(--line);padding:4px 0 4px 10px;}
.log-item.inject{border-color:var(--accent);}
.log-item.document{border-color:var(--doc-c);}
.log-item.validation-ok{border-color:var(--vert);}
.log-item.validation-ko{border-color:var(--rouge);}
.log-item.validation-wait{border-color:var(--jaune);}
.log-item.system{border-color:var(--text-faint);color:var(--text-faint);font-style:italic;}
.log-time{font-family:var(--font-mono);font-weight:600;color:var(--text-faint);margin-right:6px;}

textarea.reply{width:100%;min-height:64px;background:var(--bg-input);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13.5px;resize:vertical;}
textarea.reply:focus{outline:none;border-color:var(--accent);}
input.precision{width:100%;background:var(--bg-input);border:1px solid var(--line);border-radius:6px;color:var(--text);padding:7px 9px;font-size:12.5px;margin-top:4px;}
input.malus-manual{width:70px;background:var(--bg-input);border:1px solid var(--line);border-radius:6px;color:var(--text);padding:6px 8px;font-size:13px;}

.empty{color:var(--text-faint);font-size:13px;padding:18px 10px;text-align:center;border:1px dashed var(--line);border-radius:8px;}

/* ---------- cards / hand ---------- */
.hand-zone{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.card{border-radius:8px;padding:8px 10px;font-size:12px;font-family:var(--font-mono);width:100%;display:flex;align-items:flex-start;gap:8px;background:#fafafa;border:1px solid var(--line);}
.card.action{border-left:3px solid var(--action-c);}
.card.ressource{border-left:3px solid var(--ressource-c);}
.card input[type=checkbox]{margin-top:2px;flex:none;}
.card .card-type{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px;}
.card.action .card-type{color:var(--action-c);}
.card.ressource .card-type{color:var(--ressource-c);}
.deck-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}

.players-list{display:flex;flex-wrap:wrap;gap:6px;}
.player-chip{font-family:var(--font-mono);font-size:11px;font-weight:600;background:#fafafa;border:1px solid var(--line);border-radius:20px;padding:4px 10px;color:var(--text-dim);}

/* ---------- contact sheet ---------- */
.contact-sheet{margin-top:10px;background:rgba(0,0,145,.04);border:1px solid rgba(0,0,145,.2);border-radius:8px;padding:12px;}
.contact-sheet h4{margin:0 0 8px;font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);}
.contact-table{width:100%;border-collapse:collapse;font-size:12px;}
.contact-table th{text-align:left;font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text-faint);padding:4px 6px;border-bottom:1px solid var(--line);}
.contact-table td{padding:4px 6px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;}
.contact-table td.actor-name{white-space:nowrap;}
.contact-table input[type=checkbox]{transform:scale(1.05);}
.contact-table input[type=text]{width:100%;background:var(--bg-input);border:1px solid var(--line);border-radius:5px;color:var(--text);padding:4px 6px;font-size:11.5px;}

/* ---------- grille de points ---------- */
.points-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.points-table th{text-align:left;font-family:var(--font-mono);font-size:10.5px;font-weight:600;text-transform:uppercase;color:var(--text-faint);padding:6px;border-bottom:1px solid var(--line);}
.points-table td{padding:6px;border-bottom:1px solid rgba(0,0,0,.05);}
.points-table tr:last-child td{font-weight:600;border-top:1px solid var(--line);}

.endscreen{text-align:center;padding:60px 20px;}
.endscreen .big-result{font-family:var(--font-display);font-size:32px;font-weight:700;margin-bottom:10px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   DDTactique — prototype de serious game réseau (MJ + joueurs), multi-scénarios
   VERSION GRIST : ce fichier est destiné à être ajouté comme Custom Widget
   dans un document Grist (voir table "Sessions" requise plus bas). Le stockage
   partagé passe par les tables Grist au lieu de window.storage ; la synchro
   entre joueurs se fait par sondage (poll 2,5s) de la table Sessions.
   ========================================================================= */

const POLL_MS = 2500;
const DUREE_PARTIE_SEC = 75 * 60; // 1h15 selon la règle du jeu
const MAX_NIVEAU = 4; // 0 vert / 1 jaune / 2 orange / 3 rouge / 4 = défaite
const NIVEAU_LABELS = ['Vert','Jaune','Orange','Rouge','Crise majeure'];
const TOURS_AVANT_MALUS = 3; // carte non gérée 3 tours -> +1 malus (règle du jeu)

/* ---- cartes réelles fournies (communes à tous les scénarios DDTactique) ---- */
const ACTION_CARDS = [
  {id:'act-alerter', type:'action', label:"Alerter / informer un ou plusieurs acteurs", detail:"(à condition de remplir la feuille interlocuteur)", requiresContactSheet:true},
  {id:'act-decision', type:'action', label:"Prendre une décision", detail:"(utilisation d'un arrêté ou prise d'un arrêté)"},
  {id:'act-proposition', type:'action', label:"Proposer une décision", detail:"(proposition d'un arrêté)"},
  {id:'act-remplace', type:'action', label:"Demander à être remplacé", detail:"pour cette cellule de crise, COD, conférence de presse"}
];
const RESSOURCE_CARDS = [
  {id:'res-rh-hno', type:'ressource', label:"Ressource humaine hors heures ouvrées", detail:"(si elle est anticipée)"},
  {id:'res-outils', type:'ressource', label:"Ressource outils", detail:"(préciser quel outil vous utilisez)", requiresPrecision:true, precisionLabel:"Quel outil ?"},
  {id:'res-doc', type:'ressource', label:"Ressource documentaire", detail:"(spécifier quels documents vous utilisez)", requiresPrecision:true, precisionLabel:"Quel(s) document(s) ?"},
  {id:'res-rh-ho', type:'ressource', label:"Ressource humaine en heures ouvrées", detail:"(spécifier quelles personnes vous sollicitez)", requiresPrecision:true, precisionLabel:"Quelle(s) personne(s) ?"}
];
const ALL_CARDS = [...ACTION_CARDS, ...RESSOURCE_CARDS];
function cardDef(cardId){ return ALL_CARDS.find(c=>c.id===cardId); }

/* ---- acteurs de la feuille interlocuteur (commune à tous les scénarios) ---- */
const ACTEURS_FEUILLE = [
  "DDT – Service ?","Direction DDT","SIDPC","Cabinet préfecture","Gendarmerie","Police nationale",
  "DDPP","SDIS","SAMU","Cofiroute","ASF","CD 49","DREAL","ARS","OFB","Mairie (à préciser)",
  "DIR Ouest","Astreinte RDI","Liste de diffusion","Autres"
];

const NO_GRILLE_NOTE = "Grille de correction non fournie pour ce scénario dans ce prototype — clôturez avec un malus libre en fonction de votre jugement.";

/* =========================================================================
   SCÉNARIOS
   ========================================================================= */
const SCENARIOS = {

  circulation: {
    label: "Circulation",
    resume: "Carambolage sur l'A11, moutons errants, manifestation, pollution, pression médiatique.",
    contexteT0: "Vous êtes d'astreinte depuis lundi, vous avez eu quelques appels mais aucune grosse situation. Nous sommes aujourd'hui le vendredi 4 juillet, cela fait 10 jours qu'il fait chaud (30°C en moyenne par jour).\n\nJeudi, vous avez été informé qu'une manifestation sur les restrictions d'eau aura lieu vendredi 4 juillet de 13h à 15h30. Environ 200 manifestants sont attendus sur le boulevard Foch et devant la mairie d'Angers.",
    preludeDocument: null,
    events: [
      { titre: "Carambolage A11 — PK 267 : organiser la déviation", heure: "15h10",
        contexte: "Un carambolage s'est produit sur l'autoroute A11, au PK 267, sens Paris → Angers (sens 2). Un poids lourd transportant des moutons et dix véhicules légers sont impliqués. Le poids lourd s'est couché en portefeuille, bloquant totalement les deux voies du sens 2. Bilan humain : 2 morts, 8 blessés. Plusieurs moutons sont morts, blessés ou errent autour des voies. La tranchée couverte est fermée dans les deux sens. Cofiroute ne peut pas encore estimer la durée de l'incident.",
        demandeDe: "Cofiroute",
        defi: "Proposez une déviation adaptée au carambolage. Identifiez les axes alternatifs et informez les acteurs concernés (Cofiroute, police, préfecture)." },
      { titre: "Arrêté officiel de déviation", heure: "suite",
        contexte: "Suite au carambolage sur l'A11, la déviation doit être formalisée par un arrêté.",
        demandeDe: "SIDPC",
        defi: "Rédigez l'arrêté officiel concernant la déviation. Assurez-vous de la légalité et de la clarté des mesures prises." },
      { titre: "Moutons errants sur la chaussée", heure: "15h25",
        contexte: "Des moutons errent sur les voies et accotements, augmentant le risque d'accidents secondaires.",
        demandeDe: "SIDPC / Gendarmerie",
        defi: "Utilisez PARADES pour identifier les bétaillères disponibles. Coordonnez avec la DDPP et les éleveurs pour organiser l'évacuation des moutons." },
      { titre: "Manifestants hors itinéraire — fermeture des voies sur berges", heure: "15h50",

/* ---- Données MJ sensibles (grille de correction, notes MJ, documents) ----
   Ces données NE sont plus embarquées dans ce fichier : elles sont chargées
   depuis la table Grist "ScenarioMJData", protégée par des Access Rules pour
   n'être lisible que par les comptes Grist désignés comme Maîtres du Jeu.
   MJ_DATA[scenarioId][eventNum] = {correctionType, correction, thresholdScale, gmNote, documents, attachmentIds}
   Reste `null` si l'utilisateur courant n'a pas les droits de lecture sur cette table.

   Colonne optionnelle "Fichier" (type Attachments) sur ScenarioMJData : les
   fichiers réels (bulletins Vigicrues, etc.) déposés dans cette cellule sont
   associés aux entrées du champ Documents dans l'ordre (1er fichier = 1er
   document listé, etc.). */
let MJ_DATA = null;
function getEventMJData(scenarioId, num){
  return (MJ_DATA && MJ_DATA[scenarioId] && MJ_DATA[scenarioId][num]) || null;
}

// Les cellules de type Attachments peuvent être renvoyées encodées par
// fetchTable (ex. ['L', id1, id2, ...]) ou déjà sous forme de simple liste
// d'identifiants selon le contexte — on gère les deux cas défensivement.
function decodeAttachmentIds(raw){
  if(!raw || !Array.isArray(raw)) return [];
  if(raw[0] === 'L') return raw.slice(1);
  return raw.filter(v => typeof v === 'number');
}

async function loadMJData(){
  try{
    const rr = await grist.docApi.fetchTable('ScenarioMJData');
    const rows = rowRecordsToArray(rr);
    if(!rows.length){ MJ_DATA = null; return; }
    const data = {};
    rows.forEach(r=>{
      data[r.ScenarioId] = data[r.ScenarioId] || {};
      data[r.ScenarioId][r.EventNum] = {
        correctionType: r.CorrectionType || 'each',
        correction: JSON.parse(r.Correction || '[]'),
        thresholdScale: r.ThresholdScale ? JSON.parse(r.ThresholdScale) : null,
        gmNote: r.GmNote || '',
        documents: r.Documents ? JSON.parse(r.Documents) : [],
        attachmentIds: decodeAttachmentIds(r.Fichier)
      };
    });
    MJ_DATA = data;
  }catch(e){
    console.warn('ScenarioMJData non accessible (normal pour un compte joueur) :', e);
    MJ_DATA = null;
  }
}

function uid(){ return Math.random().toString(36).slice(2,10); }
function nowTs(){ return Date.now(); }
function fmtTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtClock(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function niveauClass(n){ return ['vert','jaune','orange','rouge','rouge'][Math.min(n,4)]; }

/* ---------------------------- persistance (Grist) ----------------------------
   Le document Grist doit contenir une table nommée "Sessions" avec 3 colonnes
   texte : Code, ScenarioId, StateJson. Chaque partie (un code) = une ligne ;
   l'intégralité de l'état de jeu est sérialisée dans StateJson (même logique
   que le window.storage clé/valeur utilisé dans la version artefact Claude,
   simplement déplacée vers une table Grist pour permettre l'auto-hébergement
   et la synchronisation entre joueurs via le document partagé). ---------------------------- */
const GRIST_TABLE = 'Sessions';
const GRIST_EVENTS_TABLE = 'Evenements';
const GRIST_EVAL_TABLE = 'Evaluation';
let EVAL_SYNCED_PLAYTHROUGHS = new Set(); // "code|createdAt" déjà écrits, pour ne pas dupliquer à chaque partie rejouée sous le même code
let RESOURCE_SEEDED_SCENARIOS = new Set(); // évite de réinsérer les 9 lignes d'un scénario déjà présent dans Evenements
let GRIST_READY = false;
let GRIST_ERROR = null;

function rowRecordsToArray(rr){
  if(!rr || !rr.id) return [];
  const keys = Object.keys(rr).filter(k=>k!=='id');
  return rr.id.map((id,i)=>{
    const row = {id};
    keys.forEach(k=>{ row[k] = rr[k][i]; });
    return row;
  });
}

// Récupère la définition statique (scénario) d'un événement — utilisée
// uniquement pour des champs qui ne sont pas éditables ligne à ligne dans
// Grist (ex. le déclenchement d'un rappel récurrent).
function getScenarioEventDef(scenarioId, num){
  const scenario = SCENARIOS[scenarioId];
  return scenario ? scenario.events[num-1] : null;
}

/* ---- Table "Evenements" : ressource PAR SCÉNARIO, pas par partie ----
   Une ligne = un événement d'un scénario donné (clé ScenarioId + Num).
   9 lignes par scénario, créées une seule fois (seedEventsResourceIfNeeded),
   jamais dupliquées à chaque nouvelle partie. Le MJ peut modifier le texte
   (Titre, Heure, DemandeDe, Contexte, Defi) directement dans Grist : le
   changement s'applique à toutes les parties futures de ce scénario.
   L'état vivant d'une partie précise (statut, niveau, malus, tours sans
   suite) n'est PAS dans cette table : il reste dans StateJson (table
   Sessions), propre à chaque partie. */
async function loadEventContent(scenarioId){
  try{
    const rr = await grist.docApi.fetchTable(GRIST_EVENTS_TABLE);
    const rows = rowRecordsToArray(rr).filter(r=>r.ScenarioId===scenarioId).sort((a,b)=>(a.Num||0)-(b.Num||0));
    if(!rows.length){
      await seedEventsResourceIfNeeded(scenarioId);
      return null; // le prochain chargement lira les lignes tout juste créées
    }
    const byNum = {};
    rows.forEach(r=>{ byNum[r.Num] = {titre:r.Titre, heure:r.Heure, demandeDe:r.DemandeDe, contexte:r.Contexte, defi:r.Defi}; });
    return byNum;
  }catch(e){
    console.warn('Table Evenements inaccessible, repli sur le contenu embarqué du scénario :', e);
    return null;
  }
}

// Crée une seule fois les 9 lignes de contenu d'un scénario dans Evenements,
// si elles n'existent pas déjà — jamais réinséré ensuite, jamais par partie.
async function seedEventsResourceIfNeeded(scenarioId){
  const key = scenarioId;
  if(RESOURCE_SEEDED_SCENARIOS.has(key)) return;
  try{
    const rr = await grist.docApi.fetchTable(GRIST_EVENTS_TABLE);
    const already = rowRecordsToArray(rr).some(r=>r.ScenarioId===scenarioId);
    RESOURCE_SEEDED_SCENARIOS.add(key);
    if(already) return;
    const scenario = SCENARIOS[scenarioId];
    if(!scenario) return;
    const actions = scenario.events.map((e,i)=>['AddRecord', GRIST_EVENTS_TABLE, null, {
      ScenarioId: scenarioId, Num: i+1, Titre: e.titre, Heure: e.heure, DemandeDe: e.demandeDe,
      Contexte: e.contexte, Defi: e.defi
    }]);
    await grist.docApi.applyUserActions(actions);
  }catch(e){
    console.warn('Impossible d\u2019alimenter la table Evenements (non bloquant, le contenu embarqué du scénario est utilisé) :', e);
  }
}

async function loadState(code){
  try{
    const rr = await grist.docApi.fetchTable(GRIST_TABLE);
    const row = rowRecordsToArray(rr).find(r=>r.Code === code);
    if(!row) return null;
    const state = JSON.parse(row.StateJson);
    // Recharge le contenu (texte) des événements depuis la table-ressource
    // Evenements, en ne touchant jamais au statut/niveau/malus vivants de
    // cette partie (qui restent tels quels, stockés dans StateJson).
    const content = await loadEventContent(state.scenarioId);
    if(content){
      state.events.forEach(e=>{
        const c = content[e.num];
        if(c){ e.titre=c.titre; e.heure=c.heure; e.demandeDe=c.demandeDe; e.contexte=c.contexte; e.defi=c.defi; }
      });
    }
    return state;
  }catch(e){ console.error('Grist loadState error', e); return null; }
}
async function saveState(state){
  try{
    const rr = await grist.docApi.fetchTable(GRIST_TABLE);
    const existing = rowRecordsToArray(rr).find(r=>r.Code === state.code);
    const payload = {Code: state.code, ScenarioId: state.scenarioId, StateJson: JSON.stringify(state)};
    if(existing){
      await grist.docApi.applyUserActions([['UpdateRecord', GRIST_TABLE, existing.id, payload]]);
    } else {
      await grist.docApi.applyUserActions([['AddRecord', GRIST_TABLE, null, payload]]);
    }
  }catch(e){ console.error('Grist saveState error', e); alert("Erreur d'écriture dans Grist — vérifiez que le widget a bien l'accès complet (\"Full document access\") et que la table Sessions existe."); }
  syncEvaluationToGrist(state); // best-effort, ne bloque jamais le jeu si la table Evaluation est absente
}

// Écrit, une seule fois par partie terminée, une ligne de bilan individuel
// par joueur dans la table Grist "Evaluation" — permet de comparer la
// progression d'une partie à l'autre pour un même scénario.
async function syncEvaluationToGrist(state){
  if(state.status !== 'ended') return;
  const playthroughKey = state.code + '|' + state.createdAt;
  if(EVAL_SYNCED_PLAYTHROUGHS.has(playthroughKey)) return;
  try{
    const scenario = SCENARIOS[state.scenarioId] || {label: state.scenarioId};
    const players = Object.values(state.players);
    if(players.length){
      const actions = players.map(p=>{
        const st = (state.playerStats && state.playerStats[p.name]) || {malus:0, evenementsAttribues:0, evenementsReussis:0};
        return ['AddRecord', GRIST_EVAL_TABLE, null, {
          Code: state.code, ScenarioId: state.scenarioId, ScenarioLabel: scenario.label,
          Date: new Date().toISOString(), Joueur: p.name,
          MalusIndividuel: st.malus, EvenementsAttribues: st.evenementsAttribues, EvenementsReussis: st.evenementsReussis,
          MalusEquipeTotal: state.malusTotal, ToursJoues: state.tour, Resultat: state.resultat || ''
        }];
      });
      await grist.docApi.applyUserActions(actions);
    }
    EVAL_SYNCED_PLAYTHROUGHS.add(playthroughKey);
  }catch(e){
    console.warn('Table Evaluation absente ou inaccessible — le bilan individuel n’est pas archivé (non bloquant) :', e);
  }
}

  render(); // affiche l'écran "Connexion à Grist…"
  try{
    grist.ready({requiredAccess: 'full'});
    // vérifie que la table Sessions existe et est accessible
    await grist.docApi.fetchTable(GRIST_TABLE);
    GRIST_READY = true;
  }catch(e){
    console.error('Grist init error', e);
    GRIST_ERROR = "Impossible d'accéder à la table « " + GRIST_TABLE + " ». Vérifiez : (1) qu'elle existe dans ce document Grist avec les colonnes Code / ScenarioId / StateJson (toutes en type Texte), (2) que ce widget a bien reçu l'accès complet au document (\"Full document access\" demandé à l'ajout du widget).";
  }
  // Chargement (silencieux) de la grille de correction MJ. Un échec ici est
  // normal et attendu pour un compte joueur : les Access Rules Grist doivent
  // le refuser. Ça ne bloque jamais l'accès au jeu lui-même.
  if(GRIST_READY){ await loadMJData(); }
  render();
}

/* ------------------------------- actions ------------------------------- */
async function createOrJoin(){
  const codeInput = document.getElementById('in-code');
  const nameInput = document.getElementById('in-name');
  let code = (codeInput.value || '').trim().toUpperCase();
  const name = (nameInput.value || '').trim();
  if(!code){ code = Math.random().toString(36).slice(2,6).toUpperCase(); }
  if(LOCAL.role === 'joueur' && !name){
    alert("Merci d'indiquer votre prénom / pseudo pour rejoindre la partie.");
    return;
  }
  LOCAL.code = code;
  LOCAL.playerName = name || 'Maître du Jeu';
  LOCAL.playerId = uid();

  let state = await loadState(code);
  if(!state){
    if(LOCAL.role !== 'mj'){
      alert("Cette session n'existe pas encore. Demandez au Maître du Jeu de créer la partie avec ce code, ou laissez le champ vide pour un nouveau code (rôle Maître du Jeu).");
      return;
    }
    if(SCENARIOS[LOCAL.scenarioChoice].enConstruction){
      alert("Ce scénario est encore en construction et n'est pas jouable pour le moment.");
      return;
    }
    state = freshState(code, LOCAL.scenarioChoice);
  }
  if(LOCAL.role === 'joueur'){
    state.players[LOCAL.playerId] = {
      name: LOCAL.playerName, joinedAt: nowTs(), lastDrawTour: -1,
      hand: [
        {instId: uid(), cardId: ACTION_CARDS[Math.floor(Math.random()*ACTION_CARDS.length)].id},
        {instId: uid(), cardId: RESSOURCE_CARDS[Math.floor(Math.random()*RESSOURCE_CARDS.length)].id}
      ]
    };
    state.log.push({id: uid(), ts: nowTs(), type:'system', text: LOCAL.playerName + ' a rejoint la cellule de crise (main initiale distribuée : 1 carte action + 1 carte ressource).'});
  }
  await saveState(state);
  LOCAL.state = state;
  LOCAL.screen = 'game';
  startPolling();
  render();
}

let MUTATING = false; // vrai pendant qu'un clic MJ/joueur est en train d'écrire dans Grist

function rulesModalActive(){
  return LOCAL.role === 'joueur' && !LOCAL.rulesAcknowledged;
}

function startPolling(){
  if(LOCAL.pollTimer) clearInterval(LOCAL.pollTimer);
  LOCAL.pollTimer = setInterval(async ()=>{
    if(MUTATING || rulesModalActive()) return; // évite d'écraser un changement en cours, et de réinitialiser le défilement de l'écran des règles
    const s = await loadState(LOCAL.code);
    if(s){ LOCAL.state = s; render(); }
  }, POLL_MS);
}

async function mutate(fn){
  MUTATING = true;
  try{
    let s = await loadState(LOCAL.code) || LOCAL.state;
    fn(s);
    await saveState(s);
    LOCAL.state = s;
  } finally {
    MUTATING = false;
  }
  render();
}

function elapsedSec(s){
  if(s.status === 'lobby') return 0;
  if(s.status === 'running'){ return s.elapsedBeforePause + (nowTs() - s.runStartedAt)/1000; }
  return s.elapsedBeforePause;
}
function remainingSec(s){ return DUREE_PARTIE_SEC - elapsedSec(s); }

function startGame(){
  mutate(s=>{
    s.status = 'running';
    s.runStartedAt = nowTs();
    s.log.push({id:uid(), ts:nowTs(), type:'system', text:'La partie démarre. Chronomètre lancé (1h15).'});
  });
}
function togglePause(){
  mutate(s=>{
    if(s.status === 'running'){
      s.elapsedBeforePause = elapsedSec(s);
      s.status = 'paused';
      s.log.push({id:uid(), ts:nowTs(), type:'system', text:'Partie mise en pause.'});
    } else if(s.status === 'paused'){
      s.status = 'running';
      s.runStartedAt = nowTs();
      s.log.push({id:uid(), ts:nowTs(), type:'system', text:'Partie reprise.'});
    }
  });
}
function endGameManually(){
  mutate(s=>{
    s.status = 'ended';
    s.resultat = s.resultat || 'arret_mj';
    s.log.push({id:uid(), ts:nowTs(), type:'system', text:'Le Maître du Jeu a mis fin à la partie.'});
  });
}
function resetGame(){
  if(!confirm('Réinitialiser complètement la partie pour ce code de session (même scénario) ?')) return;
  mutate(s=>{
    const fresh = freshState(s.code, s.scenarioId);
    fresh.players = s.players;
    Object.values(fresh.players).forEach(p=>{ p.hand = [
      {instId: uid(), cardId: ACTION_CARDS[Math.floor(Math.random()*ACTION_CARDS.length)].id},
      {instId: uid(), cardId: RESSOURCE_CARDS[Math.floor(Math.random()*RESSOURCE_CARDS.length)].id}
    ]; p.lastDrawTour = -1; });
    Object.assign(s, fresh);
  });
}

function revealNextEvent(){
  mutate(s=>{
    const next = s.events.find(e=>e.status==='a_venir');
    if(!next) return;
    next.status = 'active';
    const def = getScenarioEventDef(s.scenarioId, next.num);
    if(def && def.startsRecurringReminder){ s.recurringReminder = def.startsRecurringReminder; }
    s.log.push({id:uid(), ts:nowTs(), type:'inject', eventId: next.id, text:
      '📨 Nouvel inject — '+next.titre+' ('+next.heure+') — demande reçue de : '+next.demandeDe});
  });
}

function nextTour(){
  mutate(s=>{
    s.tour += 1;
    s.events.filter(e=>e.status==='active').forEach(e=>{
      e.toursSansSuite += 1;
      if(e.toursSansSuite >= TOURS_AVANT_MALUS){
        e.toursSansSuite = 0;
        e.niveau = Math.min(MAX_NIVEAU, e.niveau + 1);
        e.malusEvent += 1;
        s.malusTotal += 1;
        s.log.push({id:uid(), ts:nowTs(), type:'validation-ko', eventId:e.id, text:
          '⏱️ '+e.titre+' non traité depuis '+TOURS_AVANT_MALUS+' tours : +1 malus, niveau '+NIVEAU_LABELS[e.niveau]+'.'});
        if(e.niveau >= MAX_NIVEAU){ s.status = 'ended'; s.resultat = 'defaite_baro'; }
      }
    });
    const next = s.events.find(e=>e.status==='a_venir');
    if(next){
      next.status = 'active';
      const def = getScenarioEventDef(s.scenarioId, next.num);
      if(def && def.startsRecurringReminder){ s.recurringReminder = def.startsRecurringReminder; }
      s.log.push({id:uid(), ts:nowTs(), type:'inject', eventId: next.id, text:
        '📨 Nouvel inject — '+next.titre+' ('+next.heure+') — demande reçue de : '+next.demandeDe});
    }
    if(s.recurringReminder){
      s.log.push({id:uid(), ts:nowTs(), type:'system', text:'🔔 '+s.recurringReminder});
    }
    s.log.push({id:uid(), ts:nowTs(), type:'system', text:'— Tour '+s.tour+' —'});
    checkVictory(s);
  });
}
function checkVictory(s){
  if(s.events.every(e=>e.status==='resolved')){ s.status = 'ended'; s.resultat = 'victoire'; }
}

function drawCard(type){
  mutate(s=>{
    const p = s.players[LOCAL.playerId];
    if(!p) return;
    if(p.lastDrawTour === s.tour){ alert('Vous avez déjà pioché une carte ce tour-ci.'); return; }
    const pool = type==='action' ? ACTION_CARDS : RESSOURCE_CARDS;
    const card = pool[Math.floor(Math.random()*pool.length)];
    p.hand.push({instId: uid(), cardId: card.id});
    p.lastDrawTour = s.tour;
    s.log.push({id:uid(), ts:nowTs(), type:'system', text: LOCAL.playerName+' pioche une carte '+(type==='action'?'action':'ressource')+' : « '+card.label+' ».'});
  });
}

function toggleCardSelect(instId){
  LOCAL.selectedCards[instId] = !LOCAL.selectedCards[instId];
  render();
}

function submitReply(eventId){
  const ta = document.getElementById('reply-'+eventId);
  let text = ta ? ta.value.trim() : '';
  // Si le joueur a rempli "Éléments à fournir" dans la fiche interlocuteur
  // mais a laissé le champ de description principal vide, on utilise ce
  // texte-là plutôt que d'exiger une saisie en double.
  if(!text && LOCAL.contactSheet && LOCAL.contactSheet.elements && LOCAL.contactSheet.elements.trim()){
    text = LOCAL.contactSheet.elements.trim();
  }
  if(!text){ alert("Merci de décrire votre réponse avant envoi — dans le champ de texte principal, ou dans « Éléments à fournir » si vous utilisez la fiche interlocuteur."); return; }

  const selectedInstIds = Object.keys(LOCAL.selectedCards).filter(k=>LOCAL.selectedCards[k]);
  const p = LOCAL.state.players[LOCAL.playerId];
  const playedCards = selectedInstIds.map(instId=>{
    const handItem = p.hand.find(h=>h.instId===instId);
    const def = handItem ? cardDef(handItem.cardId) : null;
    return {instId, cardId: handItem ? handItem.cardId : null, label: def ? def.label : '?', precision: LOCAL.precisions[instId] || ''};
  }).filter(c=>c.cardId);

  const needsContact = playedCards.some(c=>{ const d=cardDef(c.cardId); return d && d.requiresContactSheet; });
  if(needsContact && (!LOCAL.contactSheet || !contactSheetHasAtLeastOneActor(LOCAL.contactSheet))){
    alert("La carte « Alerter/informer » nécessite de remplir la feuille interlocuteur (cochez au moins un acteur) avant l'envoi.");
    return;
  }
  const missingPrecision = playedCards.find(c=>{ const d=cardDef(c.cardId); return d && d.requiresPrecision && !c.precision.trim(); });
  if(missingPrecision){
    alert('Merci de préciser : '+ (cardDef(missingPrecision.cardId).precisionLabel||'la précision requise') +' pour la carte « '+missingPrecision.label+' ».');
    return;
  }

  mutate(s=>{
    const pp = s.players[LOCAL.playerId];
    s.submissions.push({
      id: uid(), eventId, playerName: LOCAL.playerName, text,
      ts: nowTs(), status:'pending',
      cardsPlayed: playedCards,
      contactSheet: needsContact ? LOCAL.contactSheet : null
    });
    if(pp){ pp.hand = pp.hand.filter(h=>!selectedInstIds.includes(h.instId)); }
    const evt = s.events.find(e=>e.id===eventId);
    s.log.push({id:uid(), ts:nowTs(), type:'validation-wait', eventId, text:
      '✉️ '+LOCAL.playerName+' propose une réponse pour « '+(evt?evt.titre:'')+' »'+(playedCards.length?(' — cartes jouées : '+playedCards.map(c=>c.label).join(', ')):'')+'.'});
  });
  LOCAL.activeEventForReply = null;
  LOCAL.draft = '';
  LOCAL.selectedCards = {};
  LOCAL.precisions = {};
  LOCAL.contactSheet = null;
}

function contactSheetHasAtLeastOneActor(sheet){
  if(!sheet || !sheet.actors) return false;
  return Object.values(sheet.actors).some(a=>a.tel || a.mail);
}
function initContactSheetIfNeeded(eventId){
  if(!LOCAL.contactSheet){
    LOCAL.contactSheet = {eventId, elements:'', actors:{}};
    ACTEURS_FEUILLE.forEach(a=>{ LOCAL.contactSheet.actors[a] = {tel:false, mail:false, precisions:''}; });
  }
}

/* ----- MJ : correction / clôture d'un événement ----- */
let MJ_CORRECTION_CHECKS = {};
let MJ_MANUAL_MALUS = {};
let MJ_ATTRIBUTED_PLAYER = {}; // eventId -> nom du joueur crédité/débité du résultat de cet événement

function toggleCorrectionCheck(eventId, idx){
  MJ_CORRECTION_CHECKS[eventId] = MJ_CORRECTION_CHECKS[eventId] || {};
  MJ_CORRECTION_CHECKS[eventId][idx] = !MJ_CORRECTION_CHECKS[eventId][idx];
  render();
}
function setManualMalus(eventId, val){
  MJ_MANUAL_MALUS[eventId] = Math.max(0, parseInt(val,10) || 0);
}
function setAttributedPlayer(eventId, name){
  MJ_ATTRIBUTED_PLAYER[eventId] = name;
}

// Cumule, pour le bilan individuel de fin de partie, le malus et le nombre
// d'événements attribués à un joueur donné (celui dont la réponse a servi
// de base à la correction de cet événement).
function attributeEventOutcome(s, playerName, malus){
  if(!playerName) return; // "Équipe (non attribué)" — pas de score individuel pour cet événement
  s.playerStats = s.playerStats || {};
  const st = s.playerStats[playerName] || {malus:0, evenementsAttribues:0, evenementsReussis:0};
  st.malus += malus;
  st.evenementsAttribues += 1;
  if(malus === 0) st.evenementsReussis += 1;
  s.playerStats[playerName] = st;
}

function computeMalusForEvent(evt, mjData){
  const correction = mjData && mjData.correction ? mjData.correction : null;
  if(!correction || !correction.length){
    return MJ_MANUAL_MALUS[evt.id] || 0;
  }
  const checks = MJ_CORRECTION_CHECKS[evt.id] || {};
  if(mjData.correctionType === 'threshold'){
    const total = correction.length;
    const present = correction.filter((_,idx)=>checks[idx]).length;
    const missing = total - present;
    const scale = mjData.thresholdScale || [];
    for(const tier of scale){ if(missing <= tier.max) return tier.malus; }
    return scale.length ? scale[scale.length-1].malus : 0;
  }
  let malus = 0;
  correction.forEach((item,idx)=>{
    const checked = !!checks[idx];
    if(item.malusOnChecked){ if(checked) malus += item.malus; }
    else { if(!checked) malus += (item.malus||0); }
  });
  return malus;
}

function closeEvent(eventId){
  const attributedPlayer = MJ_ATTRIBUTED_PLAYER[eventId] || null;
  mutate(s=>{
    const evt = s.events.find(e=>e.id===eventId);
    if(!evt) return;
    const mjData = getEventMJData(s.scenarioId, evt.num);
    const malus = computeMalusForEvent(evt, mjData);
    evt.malusEvent += malus;
    evt.niveau = Math.min(MAX_NIVEAU, malus>0 ? Math.max(evt.niveau,1) + (malus>=2?1:0) : evt.niveau);
    evt.status = 'resolved';
    s.malusTotal += malus;
    attributeEventOutcome(s, attributedPlayer, malus);
    s.log.push({id:uid(), ts:nowTs(), type: malus>0 ? 'validation-ko':'validation-ok', eventId,
      text: (malus>0 ? '⚠️ ' : '✅ ') + evt.titre + ' clôturé — pénalités appliquées : ' + malus + (attributedPlayer ? ' — attribué à '+attributedPlayer : '') + '.'});
    if(evt.niveau >= MAX_NIVEAU){ s.status='ended'; s.resultat='defaite_baro'; }
    checkVictory(s);
  });
  delete MJ_CORRECTION_CHECKS[eventId];
  delete MJ_MANUAL_MALUS[eventId];
  delete MJ_ATTRIBUTED_PLAYER[eventId];
}
function keepEventOpen(eventId){
  mutate(s=>{
    const evt = s.events.find(e=>e.id===eventId);
    if(!evt) return;
    s.log.push({id:uid(), ts:nowTs(), type:'validation-wait', eventId, text:
      '🔁 '+evt.titre+' — cartes action/ressource jugées inadaptées, l’événement reste actif pour le tour suivant.'});
  });
}

function malusAdjust(delta){ mutate(s=>{ s.malusTotal = Math.max(0, s.malusTotal + delta); }); }

/* --------------------------------- render -------------------------------- */
function render(){
  // Préserve le focus, la position du curseur, et la position de défilement
  // pendant qu'un champ texte est en cours de saisie, car ce redessin complet
  // est aussi déclenché automatiquement (rafraîchissement du chrono,
  // synchronisation Grist) — sans ça, un long formulaire (ex. fiche
  // interlocuteur) revient en haut de la page en pleine saisie.
  const active = document.activeElement;
  let focusInfo = null;
  if(active && active.id && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')){
    focusInfo = {
      id: active.id,
      selStart: (typeof active.selectionStart === 'number') ? active.selectionStart : null,
      selEnd: (typeof active.selectionEnd === 'number') ? active.selectionEnd : null
    };
  }
  const scrollY = window.scrollY;
  renderInternal();
  if(focusInfo){
    const el = document.getElementById(focusInfo.id);
    if(el){
      el.focus();
      if(focusInfo.selStart !== null && el.setSelectionRange){
        try{ el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); }catch(e){}
      }
    }
  }
  window.scrollTo(0, scrollY);
}

function renderInternal(){
  const app = document.getElementById('app');
  if(GRIST_ERROR){
    app.innerHTML = renderGristError();
    const btn = document.getElementById('btn-retry-grist');
    if(btn) btn.onclick = ()=>{ GRIST_ERROR = null; boot(); };
    return;
  }
  if(!GRIST_READY){ app.innerHTML = renderGristLoading(); return; }
  if(LOCAL.screen === 'landing'){ app.innerHTML = renderLanding(); attachLandingHandlers(); return; }
  const s = LOCAL.state;
  if(!s) return;
  if(LOCAL.role === 'joueur' && !LOCAL.rulesAcknowledged){
    app.innerHTML = renderRulesModal();
    const btn = document.getElementById('btn-accept-rules');
    if(btn) btn.onclick = ()=>{ LOCAL.rulesAcknowledged = true; render(); };
    return;
  }
  if(s.status === 'ended'){ app.innerHTML = renderEnd(s); attachCommonHandlers(s); return; }
  app.innerHTML = renderGame(s);
  attachCommonHandlers(s);
}

function attachLandingHandlers(){
  document.getElementById('role-mj').onclick = ()=>{ LOCAL.role='mj'; render(); };
  document.getElementById('role-joueur').onclick = ()=>{ LOCAL.role='joueur'; render(); };

function renderTimer(s){
  const rem = remainingSec(s);
  let cls = '';
  if(rem < 600) cls='crit'; else if(rem < 1200) cls='warn';
  return `<div class="timer ${cls}">${fmtTime(rem)}</div>`;
}
function renderGauge(niveauMax){
  let segs = '';
  for(let i=0;i<4;i++){ const on = i < niveauMax ? 'on-'+niveauClass(i) : ''; segs += `<div class="gauge-seg ${on}"></div>`; }
  return `<div class="gauge-wrap"><div class="gauge-track">${segs}</div><span class="gauge-label">${NIVEAU_LABELS[Math.min(niveauMax,4)]}</span></div>`;
}

// Couleur pleine de chaque palier du thermomètre : 0 bleu (calme) → 4 rouge (crise majeure)
const THERMO_COLORS = ['#0063cb','#18753c','#a68200','#b34000','#ce0500'];

// Éclaircit une couleur hex d'un montant donné (pour les dégradés du thermomètre)
function shadeHex(hex, amt){
  const n = parseInt(hex.slice(1),16);
  let r = (n>>16) + amt, g = ((n>>8)&0xff) + amt, b = (n&0xff) + amt;
  r = Math.min(255,Math.max(0,r)); g = Math.min(255,Math.max(0,g)); b = Math.min(255,Math.max(0,b));
  return '#' + (0x1000000 + (r<<16) + (g<<8) + b).toString(16).slice(1);
}

function renderThermometer(niveau, events){
  niveau = Math.max(0, Math.min(niveau, MAX_NIVEAU));
  const tubeW = 15, tubeX = 38 - tubeW/2;
  const tubeTop = 18, tubeBottom = 196, tubeHeight = tubeBottom - tubeTop;
  const bulbR = 19, bulbCy = tubeBottom + bulbR - 6; // léger chevauchement avec le tube pour fusionner les deux formes
  const fillTop = tubeBottom - (niveau / MAX_NIVEAU) * tubeHeight;
  const currentColor = THERMO_COLORS[niveau];
  const lightColor = shadeHex(currentColor, 60);
  const darkColor = shadeHex(currentColor, -35);
  const isCrise = niveau >= MAX_NIVEAU;
  const uid_ = 'th'+Math.round(niveau*97); // ids de dégradé uniques par niveau pour éviter les conflits de cache SVG

  // repères des 5 paliers (0 à 4), avec une pastille de couleur rappelant l'échelle de vigilance
  let ticks = '';
  for(let i=0; i<=MAX_NIVEAU; i++){
    const y = tubeBottom - (i / MAX_NIVEAU) * tubeHeight;
    ticks += `<circle cx="58" cy="${y}" r="4" fill="${THERMO_COLORS[i]}"/>
      <text x="68" y="${y+4}" font-size="10" font-family="Public Sans, sans-serif" fill="var(--text-faint)">${i}</text>`;
  }
  // repères par événement : une pastille numérotée par carte active ou résolue,
  // positionnée sur le tube selon SON PROPRE niveau — pour que les joueurs
  // situent chaque inject, même quand un nouveau vient s'ajouter aux autres.
  const plottable = (events||[]).filter(e=>e.status==='active' || e.status==='resolved');
  const byNiveau = {};
  plottable.forEach(e=>{ (byNiveau[e.niveau] = byNiveau[e.niveau]||[]).push(e); });
  let markers = '';
  Object.keys(byNiveau).forEach(nvStr=>{
    const nv = parseInt(nvStr,10);
    const y = tubeBottom - (nv / MAX_NIVEAU) * tubeHeight;
    byNiveau[nv].forEach((e,idx)=>{
      const x = 96 + idx*26;
      const resolved = e.status==='resolved';
      const col = THERMO_COLORS[Math.min(nv,MAX_NIVEAU)];
      const title = 'Événement '+e.num+' — '+e.titre+' — '+(resolved?'résolu':'actif')+', niveau '+NIVEAU_LABELS[Math.min(nv,MAX_NIVEAU)];
      markers += `<g>
        <title>${escapeHtml(title)}</title>
        <circle cx="${x}" cy="${y}" r="11" fill="${resolved?'var(--bg-panel)':col}" stroke="${col}" stroke-width="2" opacity="${resolved?0.6:1}"/>
        <text x="${x}" y="${y+4}" font-size="10.5" font-weight="700" font-family="Public Sans, sans-serif" text-anchor="middle" fill="${resolved?col:'#ffffff'}">${e.num}</text>
        ${resolved?`<text x="${x+10}" y="${y-8}" font-size="10" fill="var(--vert)">✓</text>`:''}
      </g>`;
    });
  });
  const maxPerRow = Math.max(1, ...Object.values(byNiveau).map(arr=>arr.length));
  const svgWidth = 96 + maxPerRow*26 + 16;
  const svgHeight = bulbCy + bulbR + 10;

  return `
  <svg class="thermo-svg" viewBox="0 0 ${svgWidth} ${svgHeight}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="${uid_}-clip">
        <path d="M ${tubeX} ${tubeTop+tubeW/2}
                 a ${tubeW/2} ${tubeW/2} 0 0 1 ${tubeW} 0
                 L ${tubeX+tubeW} ${tubeBottom}
                 a ${bulbR} ${bulbR} 0 1 1 ${-tubeW} 0 Z"/>
      </clipPath>
      <linearGradient id="${uid_}-mercury" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="${darkColor}"/>
        <stop offset="45%" stop-color="${currentColor}"/>
        <stop offset="100%" stop-color="${lightColor}"/>
      </linearGradient>
      <radialGradient id="${uid_}-bulb" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="${lightColor}"/>
        <stop offset="55%" stop-color="${currentColor}"/>
        <stop offset="100%" stop-color="${darkColor}"/>
      </radialGradient>
      <linearGradient id="${uid_}-glass" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
        <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
      </linearGradient>
    </defs>

    <!-- silhouette complète du thermomètre (tube + bulbe fondus en une seule forme) -->
    <path d="M ${tubeX} ${tubeTop+tubeW/2}
             a ${tubeW/2} ${tubeW/2} 0 0 1 ${tubeW} 0
             L ${tubeX+tubeW} ${tubeBottom}
             a ${bulbR} ${bulbR} 0 1 1 ${-tubeW} 0 Z"
          fill="#ffffff" stroke="var(--line)" stroke-width="1.5"/>

    <!-- mercure : remplissage jusqu'au niveau courant, à l'intérieur de la silhouette -->
    <g clip-path="url(#${uid_}-clip)">
      <rect x="${tubeX-2}" y="${fillTop}" width="${tubeW+4}" height="${svgHeight-fillTop}" fill="url(#${uid_}-mercury)"/>
      <circle cx="38" cy="${bulbCy}" r="${bulbR+2}" fill="url(#${uid_}-bulb)"/>
    </g>

    <!-- reflet de verre -->
    <path d="M ${tubeX} ${tubeTop+tubeW/2}
             a ${tubeW/2} ${tubeW/2} 0 0 1 ${tubeW} 0
             L ${tubeX+tubeW} ${tubeBottom}
             a ${bulbR} ${bulbR} 0 1 1 ${-tubeW} 0 Z"
          fill="url(#${uid_}-glass)" opacity="0.5" clip-path="url(#${uid_}-clip)"/>
    <ellipse cx="32" cy="${bulbCy-7}" rx="5" ry="8" fill="#ffffff" opacity="0.35"/>

    <!-- contour final -->
    <path d="M ${tubeX} ${tubeTop+tubeW/2}
             a ${tubeW/2} ${tubeW/2} 0 0 1 ${tubeW} 0
             L ${tubeX+tubeW} ${tubeBottom}
             a ${bulbR} ${bulbR} 0 1 1 ${-tubeW} 0 Z"
          fill="none" stroke="var(--line)" stroke-width="1.5"/>

    ${ticks}
    ${markers}
  </svg>
  <div class="thermo-current-label ${isCrise?'crise':''}">${isCrise ? '🚨 Crise majeure' : NIVEAU_LABELS[niveau]}</div>
  <div class="thermo-sub">Niveau ${niveau} / ${MAX_NIVEAU}</div>
  <div class="thermo-sub" style="margin-top:6px;">● = actif · ○✓ = résolu — survolez un repère pour le détail</div>`;
}

function renderGame(s){

  <div class="topbar">

      <span class="badge scenario">Scénario : ${escapeHtml(scenario.label)}</span>
      <span class="badge">Session ${s.code}</span>
      <span class="badge">Tour ${s.tour}</span>
    </div>
    <div class="topbar-left">${renderTimer(s)}${renderGauge(niveauGlobal)}</div>

    </div>

      ${s.status==='lobby' ? renderLobbyPanel(s, isMJ, scenario) : ''}

      ${activeEvents.length ? `
      <div class="panel">
        <div class="panel-head"><h2>Injects en cours</h2>${isMJ && pendingEvents.length ? `<button class="btn accent" id="btn-reveal">📨 Envoyer le prochain inject</button>` : ''}</div>
        ${activeEvents.map(e=>renderEventCard(e, isMJ, canSeeMJData, s)).join('')}
      </div>` : `
      <div class="panel">
        <div class="panel-head"><h2>Injects en cours</h2>${isMJ && pendingEvents.length ? `<button class="btn accent" id="btn-reveal">📨 Envoyer le premier inject</button>` : ''}</div>
        <div class="empty">Aucun inject actif pour le moment.${isMJ ? ' Cliquez sur « Envoyer le prochain inject » pour lancer le prochain événement.' : ' En attente du Maître du Jeu.'}</div>
      </div>`}

      ${isMJ ? `
      <div class="panel">
        <div class="panel-head"><h2>Contrôle du tour</h2></div>
        ${s.recurringReminder ? `<div class="gm-note"><b>Rappel actif chaque tour</b>${escapeHtml(s.recurringReminder)}</div>` : ''}
        <p style="margin:8px 0 8px;font-size:13px;">Clôturez le tour pour faire avancer les événements non traités sur le baromètre et révéler l'inject suivant.</p>
        <div class="btn-row">
          <button class="btn big accent" id="btn-next-tour" ${s.status!=='running'?'disabled':''}>⏭ Tour suivant</button>
          <button class="btn" id="btn-malus-plus">+1 malus manuel</button>
          <button class="btn" id="btn-malus-moins">−1 malus manuel</button>
        </div>
      </div>` : ''}

      ${isMJ ? `
      <div class="panel"><div class="panel-head"><h2>Grille de points</h2></div>${renderGrillePoints(s)}</div>` : ''}

      ${pendingEvents.length ? `
      <div class="panel"><div class="panel-head"><h2>Cartes événement restantes</h2></div>
        <p style="font-size:13px;margin:0;">${pendingEvents.length} carte(s) événement en attente dans le paquet (contexte non visible avant tirage).</p>
      </div>` : ''}

      ${resolvedEvents.length ? `
      <div class="panel"><div class="panel-head"><h2>Événements clos</h2></div>
        ${resolvedEvents.map(e=>renderEventCard(e, isMJ, canSeeMJData, s)).join('')}
      </div>` : ''}
    </div>

    <div>
      ${!isMJ && me ? `
      <div class="panel">
        <div class="panel-head"><h2>Votre main</h2><span class="badge">${me.hand.length} carte(s)</span></div>
        <div class="hand-zone">${me.hand.length ? me.hand.map(h=>renderHandCardStatic(h)).join('') : '<span class="hint">Main vide.</span>'}</div>

          <button class="btn" data-draw="action" ${me.lastDrawTour===s.tour?'disabled':''}>🂠 Piocher 1 carte action</button>

      </div>

      <div class="panel">
        <div class="panel-head"><h2>Cellule de crise</h2></div>
        <div class="players-list">${Object.values(s.players).map(p=>`<span class="player-chip">${escapeHtml(p.name)} (${p.hand?p.hand.length:0} cartes)</span>`).join('') || '<span class="hint">Aucun joueur connecté.</span>'}</div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>Journal de crise</h2></div>
        <div class="log">${[...s.log].reverse().map(l=>`<div class="log-item ${l.type}"><span class="log-time">${fmtClock(l.ts)}</span>${escapeHtml(l.text)}${l.attachmentId?` <button class="btn doc" style="padding:2px 8px;font-size:10.5px;" data-download-att="${l.attachmentId}">⬇ Télécharger</button>`:''}</div>`).join('') || '<div class="empty">Le journal est vide.</div>'}</div>
      </div>
    </div>
  </div>
  `;
}

  const def = cardDef(h.cardId);
  if(!def) return '';
  return `<div class="card ${def.type}"><span><span class="card-type">${def.type==='action'?'Action':'Ressource'}</span>${escapeHtml(def.label)}${def.detail?` <span style="color:var(--text-faint)">— ${escapeHtml(def.detail)}</span>`:''}</span></div>`;
}

  const mjData = canSeeMJData ? getEventMJData(s.scenarioId, e.num) : null;
  const lastStatusPill = resolved
    ? `<span class="pill ${e.malusEvent>0?'ko':'ok'}">${e.malusEvent>0? e.malusEvent+' malus' : 'Traité — 0 malus'}</span>`
    : (e.toursSansSuite>0 ? `<span class="pill wait">${e.toursSansSuite}/${TOURS_AVANT_MALUS} tours sans suite</span>` : '');

  return `
  <div class="event-card lvl-${e.niveau} ${resolved?'resolved':''}">
    <div class="event-head">
      <div>
        <div class="event-num">CARTE ÉVÉNEMENT ${e.num} · ${e.heure}</div>
        <div class="event-title">${escapeHtml(e.titre)}</div>
        <div class="event-meta">Demande reçue de : ${escapeHtml(e.demandeDe)}</div>

    ${isMJ && mjData && mjData.gmNote ? `<div class="gm-note"><b>Note MJ (masquée aux joueurs)</b>${escapeHtml(mjData.gmNote)}</div>` : ''}

    ${isMJ && mjData && mjData.documents && mjData.documents.length ? renderDocBox(e, mjData) : ''}

    ${isMJ && canSeeMJData && !resolved ? renderCorrectionBox(e, mjData, s) : ''}

  </div>`;
}

  const current = MJ_ATTRIBUTED_PLAYER[eventId] || '';
  return `
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
    <label style="font-size:12.5px;font-weight:600;">Attribuer ce résultat à :</label>
    <select data-attribute-player="${eventId}" style="padding:6px 8px;border-radius:6px;border:1px solid var(--line);background:var(--bg-input);color:var(--text);font-size:12.5px;">
      <option value="" ${current===''?'selected':''}>Équipe (non attribué)</option>
      ${names.map(n=>`<option value="${escapeHtml(n)}" ${current===n?'selected':''}>${escapeHtml(n)}</option>`).join('')}
    </select>
    ${!names.length ? '<span class="hint" style="margin:0;">Aucune réponse soumise pour cet événement pour le moment.</span>' : ''}
  </div>`;
}

function renderCorrectionBox(e, mjData, s){
  const correction = mjData ? mjData.correction : null;
  if(!correction || !correction.length){
    return `
    <div class="correction-box">
      <b>Fiche de correction MJ</b>
      <div class="no-grille">${escapeHtml(NO_GRILLE_NOTE)}</div>
      ${renderAttributionSelect(e.id, s)}
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:12.5px;">Malus à appliquer :</label>
        <input type="number" min="0" id="malus-manual-${e.id}" class="malus-manual" data-manual-malus="${e.id}" value="${MJ_MANUAL_MALUS[e.id]||0}">
      </div>
      <div class="btn-row">
        <button class="btn ok" data-close-event="${e.id}">✅ Clôturer et appliquer le malus</button>
        <button class="btn wait" data-keep-open="${e.id}">🔁 Laisser en cours</button>
      </div>
    </div>`;
  }
  const checks = MJ_CORRECTION_CHECKS[e.id] || {};
  const estMalus = computeMalusForEvent(e, mjData);
  let itemsHtml = '';
  if(mjData.correctionType === 'threshold'){
    itemsHtml = correction.map((it,idx)=>`
      <label class="correction-item"><input type="checkbox" data-corr="${e.id}|${idx}" ${checks[idx]?'checked':''}> ${escapeHtml(it.label)}</label>`).join('');
    itemsHtml += `<div class="threshold-note">Malus selon éléments manquants — 0-1 : 0 · 2 : +1 · 3 : +2 · 4 ou + : +3 (calcul automatique)</div>`;
  } else {
    itemsHtml = correction.map((it,idx)=>`
      <label class="correction-item"><input type="checkbox" data-corr="${e.id}|${idx}" ${checks[idx]?'checked':''}> ${escapeHtml(it.label)} <span class="malus-tag">${it.malusOnChecked? ('si coché : +'+it.malus) : ('si manquant : +'+(it.malus||0))}</span></label>`).join('');
  }
  return `
  <div class="correction-box">
    <b>Fiche de correction MJ — malus estimé : ${estMalus}</b>
    ${itemsHtml}
    ${renderAttributionSelect(e.id, s)}
    <div class="btn-row">
      <button class="btn ok" data-close-event="${e.id}">✅ Clôturer et appliquer ${estMalus} malus</button>
      <button class="btn wait" data-keep-open="${e.id}">🔁 Laisser en cours (cartes inadaptées)</button>
    </div>
  </div>`;
}

function renderReplyForm(e, s){
  const p = s.players[LOCAL.playerId];
  const hand = p ? p.hand : [];
  return `
  <div style="margin-top:10px;">
    <textarea class="reply" id="reply-${e.id}" placeholder="Décrivez l'action / la décision prise pour gérer cet événement…">${LOCAL.draft}</textarea>

    ${hand.length ? `
    <div style="margin-top:8px;">
      <div class="hint" style="margin:0 0 6px;">Cartes à jouer avec cette réponse (optionnel) :</div>
      <div class="hand-zone">${hand.map(h=>renderHandCardSelectable(h)).join('')}</div>
    </div>` : ''}

    ${needsContactSheetPreview(hand) ? renderContactSheetForm(e) : ''}
    ${needsContactSheetPreview(hand) ? `<p class="hint">Le champ ci-dessus ou le champ « Éléments à fournir » de la fiche contact suffit — inutile de remplir les deux.</p>` : ''}

    <div class="btn-row">
      <button class="btn ok" data-reply-send="${e.id}">Envoyer au MJ</button>
      <button class="btn" data-reply-cancel="1">Annuler</button>
    </div>
  </div>`;
}
function needsContactSheetPreview(hand){
  return hand.some(h=>{ const inst=h.instId; if(!LOCAL.selectedCards[inst]) return false; const d=cardDef(h.cardId); return d && d.requiresContactSheet; });
}

function renderHandCardSelectable(h){
  const def = cardDef(h.cardId);
  if(!def) return '';
  const checked = !!LOCAL.selectedCards[h.instId];
  const needsPrec = def.requiresPrecision;
  return `
  <label class="card ${def.type}" style="cursor:pointer;">
    <input type="checkbox" data-select-card="${h.instId}" ${checked?'checked':''}>
    <span>
      <span class="card-type">${def.type==='action'?'Action':'Ressource'}</span>
      ${escapeHtml(def.label)}${def.detail?` <span style="color:var(--text-faint)">— ${escapeHtml(def.detail)}</span>`:''}
      ${checked && needsPrec ? `<input type="text" id="precision-${h.instId}" class="precision" placeholder="${escapeHtml(def.precisionLabel||'Précisez…')}" data-precision="${h.instId}" value="${escapeHtml(LOCAL.precisions[h.instId]||'')}">` : ''}
    </span>
  </label>`;
}

function renderContactSheetForm(e){
  initContactSheetIfNeeded(e.id);
  const cs = LOCAL.contactSheet;
  return `
  <div class="contact-sheet">
    <h4>Fiche contact — carte « Alerter / informer »</h4>
    <div class="field" style="margin-bottom:8px;">
      <label>Éléments à fournir</label>
      <input type="text" id="cs-elements" value="${escapeHtml(cs.elements||'')}" placeholder="Ce que vous transmettez aux acteurs contactés">
    </div>
    <table class="contact-table">
      <thead><tr><th>Acteurs à contacter</th><th>Tél.</th><th>Mail</th><th>Précisions</th></tr></thead>
      <tbody>
        ${ACTEURS_FEUILLE.map((a,idx)=>`
        <tr>
          <td class="actor-name">${escapeHtml(a)}</td>
          <td><input type="checkbox" id="cs-tel-${idx}" data-cs-tel="${escapeHtml(a)}" ${cs.actors[a] && cs.actors[a].tel ? 'checked':''}></td>
          <td><input type="checkbox" id="cs-mail-${idx}" data-cs-mail="${escapeHtml(a)}" ${cs.actors[a] && cs.actors[a].mail ? 'checked':''}></td>
          <td><input type="text" id="cs-prec-${idx}" data-cs-prec="${escapeHtml(a)}" value="${escapeHtml(cs.actors[a]?cs.actors[a].precisions:'')}"></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderSubMini(sub, forMJ){
  const pillClass = sub.status==='pending' ? 'pending' : (sub.status==='validated_ok'?'ok':'wait');
  const pillLabel = sub.status==='pending' ? 'En attente de correction MJ' : (sub.status==='validated_ok'?'Intégré':'Vu');
  return `
  <div class="sub-item">
    <div class="sub-head"><span>${escapeHtml(sub.playerName)} · ${fmtClock(sub.ts)}</span><span class="pill ${pillClass}">${pillLabel}</span></div>
    <div class="sub-text">${escapeHtml(sub.text)}</div>
    ${sub.cardsPlayed && sub.cardsPlayed.length ? `<div class="sub-cards">${sub.cardsPlayed.map(c=>`<span class="pill pending" style="margin:2px 4px 0 0;">${escapeHtml(c.label)}${c.precision?(' : '+escapeHtml(c.precision)):''}</span>`).join('')}</div>` : ''}
    ${sub.contactSheet ? renderContactSheetSummary(sub.contactSheet) : ''}
  </div>`;
}
function renderContactSheetSummary(cs){
  const rows = Object.entries(cs.actors).filter(([,v])=>v.tel||v.mail);
  if(!rows.length) return '';
  return `<div style="margin-top:6px;font-size:12px;color:var(--text-dim);">
    <b style="color:var(--accent);">Feuille interlocuteur :</b> ${rows.map(([name,v])=>escapeHtml(name)+' ('+[v.tel?'tél.':null,v.mail?'mail':null].filter(Boolean).join('/')+(v.precisions?(' — '+escapeHtml(v.precisions)):'')+')').join(', ')}
    ${cs.elements ? `<br><i>Éléments transmis : ${escapeHtml(cs.elements)}</i>`:''}
  </div>`;
}

function renderEnd(s){
  const scenario = SCENARIOS[s.scenarioId] || {label:'?'};
  const titles = {
    victoire: {t:'Victoire', c:'var(--vert)', d:"Tous les événements ont été traités avant la fin du temps imparti."},
    defaite_baro: {t:'Défaite', c:'var(--rouge)', d:"Un événement a atteint le seuil maximum du baromètre."},
    defaite_temps: {t:'Temps écoulé', c:'var(--jaune)', d:"Les 1h15 réglementaires sont dépassées."},
    arret_mj: {t:'Partie arrêtée', c:'var(--text-dim)', d:"Le Maître du Jeu a mis fin à la partie."}
  };
  const info = titles[s.resultat] || titles.arret_mj;
  const traites = s.events.filter(e=>e.status==='resolved').length;
  return `
  <div class="endscreen">
    <p class="eyebrow">Fin de partie — scénario ${escapeHtml(scenario.label)} — session ${s.code}</p>
    <div class="big-result" style="color:${info.c}">${info.t}</div>
    <p>${info.d}</p>
    <p style="font-family:var(--font-mono);font-size:13px;">Événements traités : ${traites} / ${s.events.length} · Malus cumulés : ${s.malusTotal} · Tours joués : ${s.tour}</p>
    ${LOCAL.role==='mj' ? `<div class="panel" style="max-width:640px;margin:20px auto;text-align:left;">${renderGrillePoints(s)}</div>` : ''}
    ${LOCAL.role==='mj' ? `<div class="panel" style="max-width:640px;margin:16px auto;text-align:left;">${renderBilanIndividuel(s)}</div>` : ''}
    ${LOCAL.role==='mj' ? `<div class="btn-row" style="justify-content:center;margin-top:12px;"><button class="btn big accent" id="btn-reset-end">↺ Nouvelle partie (même scénario, même code)</button></div>` : ''}
  </div>`;
}

function renderBilanIndividuel(s){
  const players = Object.values(s.players);
  if(!players.length){ return '<h2 style="margin-bottom:10px;">Bilan individuel</h2><div class="empty">Aucun joueur n\u2019a rejoint cette partie.</div>'; }
  return `
  <h2 style="margin-bottom:10px;">Bilan individuel</h2>
  <table class="points-table">
    <thead><tr><th>Joueur</th><th>Événements attribués</th><th>Réussis</th><th>Malus individuel</th></tr></thead>
    <tbody>
      ${players.map(p=>{
        const st = (s.playerStats && s.playerStats[p.name]) || {malus:0, evenementsAttribues:0, evenementsReussis:0};
        return `<tr><td>${escapeHtml(p.name)}</td><td>${st.evenementsAttribues}</td><td>${st.evenementsReussis}</td><td>${st.malus}</td></tr>`;
      }).join('')}
    </tbody>
  </table>
  <p class="hint" style="margin-top:8px;">Ce bilan est archivé automatiquement dans la table Grist « Evaluation » à la fermeture de la partie, pour suivre la progression d'une partie à l'autre.</p>`;
}

function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

/* ---------------------------- event handlers ---------------------------- */
function attachCommonHandlers(s){
  const byId = id => document.getElementById(id);

  if(byId('btn-start')) byId('btn-start').onclick = startGame;
  if(byId('btn-start-2')) byId('btn-start-2').onclick = startGame;
  if(byId('btn-pause')) byId('btn-pause').onclick = togglePause;
  if(byId('btn-end')) byId('btn-end').onclick = ()=>{ if(confirm('Terminer la partie maintenant ?')) endGameManually(); };
  if(byId('btn-reset')) byId('btn-reset').onclick = resetGame;
  if(byId('btn-reset-end')) byId('btn-reset-end').onclick = resetGame;
  if(byId('btn-reveal')) byId('btn-reveal').onclick = revealNextEvent;
  if(byId('btn-next-tour')) byId('btn-next-tour').onclick = nextTour;
  if(byId('btn-malus-plus')) byId('btn-malus-plus').onclick = ()=>malusAdjust(1);
  if(byId('btn-malus-moins')) byId('btn-malus-moins').onclick = ()=>malusAdjust(-1);
  if(byId('btn-toggle-context')) byId('btn-toggle-context').onclick = ()=>{ LOCAL.contextOpen = !LOCAL.contextOpen; render(); };

  document.querySelectorAll('[data-draw]').forEach(btn=>{ btn.onclick = ()=>drawCard(btn.getAttribute('data-draw')); });

  document.querySelectorAll('[data-reply-open]').forEach(btn=>{
    btn.onclick = ()=>{ LOCAL.activeEventForReply = btn.getAttribute('data-reply-open'); LOCAL.draft=''; LOCAL.selectedCards={}; LOCAL.precisions={}; LOCAL.contactSheet=null; render(); };
  });
  document.querySelectorAll('[data-reply-cancel]').forEach(btn=>{
    btn.onclick = ()=>{ LOCAL.activeEventForReply = null; LOCAL.draft=''; LOCAL.selectedCards={}; LOCAL.precisions={}; LOCAL.contactSheet=null; render(); };
  });
  document.querySelectorAll('[data-reply-send]').forEach(btn=>{ btn.onclick = ()=>submitReply(btn.getAttribute('data-reply-send')); });
  document.querySelectorAll('[data-select-card]').forEach(cb=>{ cb.onchange = ()=>toggleCardSelect(cb.getAttribute('data-select-card')); });
  document.querySelectorAll('[data-precision]').forEach(inp=>{ inp.oninput = ()=>{ LOCAL.precisions[inp.getAttribute('data-precision')] = inp.value; }; });
  document.querySelectorAll('[data-corr]').forEach(cb=>{
    cb.onchange = ()=>{ const [eid, idx] = cb.getAttribute('data-corr').split('|'); toggleCorrectionCheck(eid, parseInt(idx,10)); };
  });
  document.querySelectorAll('[data-manual-malus]').forEach(inp=>{
    inp.oninput = ()=>{ setManualMalus(inp.getAttribute('data-manual-malus'), inp.value); };
  });
  document.querySelectorAll('[data-attribute-player]').forEach(sel=>{
    sel.onchange = ()=>{ setAttributedPlayer(sel.getAttribute('data-attribute-player'), sel.value); };
  });
  if(byId('cs-elements')) byId('cs-elements').oninput = (ev)=>{ if(LOCAL.contactSheet) LOCAL.contactSheet.elements = ev.target.value; };
  document.querySelectorAll('[data-cs-tel]').forEach(cb=>{
    cb.onchange = ()=>{ const a=cb.getAttribute('data-cs-tel'); if(LOCAL.contactSheet){ LOCAL.contactSheet.actors[a]=LOCAL.contactSheet.actors[a]||{}; LOCAL.contactSheet.actors[a].tel = cb.checked; } };
  });
  document.querySelectorAll('[data-cs-mail]').forEach(cb=>{
    cb.onchange = ()=>{ const a=cb.getAttribute('data-cs-mail'); if(LOCAL.contactSheet){ LOCAL.contactSheet.actors[a]=LOCAL.contactSheet.actors[a]||{}; LOCAL.contactSheet.actors[a].mail = cb.checked; } };
  });
  document.querySelectorAll('[data-cs-prec]').forEach(inp=>{
    inp.oninput = ()=>{ const a=inp.getAttribute('data-cs-prec'); if(LOCAL.contactSheet){ LOCAL.contactSheet.actors[a]=LOCAL.contactSheet.actors[a]||{}; LOCAL.contactSheet.actors[a].precisions = inp.value; } };
  });
  document.querySelectorAll('[data-close-event]').forEach(btn=>{ btn.onclick = ()=>closeEvent(btn.getAttribute('data-close-event')); });
  document.querySelectorAll('[data-keep-open]').forEach(btn=>{ btn.onclick = ()=>keepEventOpen(btn.getAttribute('data-keep-open')); });

  document.querySelectorAll('[data-doc-open]').forEach(btn=>{
    btn.onclick = ()=>{
      const [eventId, docId, encContent] = btn.getAttribute('data-doc-open').split('|');
      openDocEditor(eventId, docId, decodeURIComponent(encContent));
    };
  });
  document.querySelectorAll('[data-doc-cancel]').forEach(btn=>{ btn.onclick = cancelDocEditor; });
  document.querySelectorAll('[data-doc-send]').forEach(btn=>{
    btn.onclick = ()=>{
      const [eventId, docId, encLabel, attId] = btn.getAttribute('data-doc-send').split('|');
      const ta = byId('doc-editor-'+eventId+'-'+docId);
      LOCAL.docDraft = ta ? ta.value : LOCAL.docDraft;
      sendDocument(eventId, docId, decodeURIComponent(encLabel), attId || null);
    };
  });
  document.querySelectorAll('.doc-edit textarea').forEach(ta=>{ ta.oninput = ()=>{ LOCAL.docDraft = ta.value; }; });
  document.querySelectorAll('[data-download-att]').forEach(btn=>{
    btn.onclick = ()=>downloadAttachment(btn.getAttribute('data-download-att'));
  });

  document.querySelectorAll('textarea.reply').forEach(ta=>{ ta.oninput = ()=>{ LOCAL.draft = ta.value; }; });
}

/* auto refresh du chrono même sans changement de state (affichage seul) */
setInterval(()=>{
  if(LOCAL.screen==='game' && LOCAL.state && LOCAL.state.status==='running' && !rulesModalActive()){
    if(remainingSec(LOCAL.state) <= 0 && LOCAL.state.status !== 'ended'){
      mutate(s=>{ if(s.status==='running' && remainingSec(s)<=0){ s.status='ended'; s.resultat='defaite_temps'; } });
    } else { render(); }
  }
}, 1000);

boot();
</script>
</body>
</html>
